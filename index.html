<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후지 플러쉬</title>
<style>
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Thin.woff2')format('woff2');font-weight:100;font-display:swap}
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-ExtraLight.woff2')format('woff2');font-weight:200;font-display:swap}
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Light.woff2')format('woff2');font-weight:300;font-display:swap}
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Regular.woff2')format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Medium.woff2')format('woff2');font-weight:500;font-display:swap}
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-SemiBold.woff2')format('woff2');font-weight:600;font-display:swap}
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Bold.woff2')format('woff2');font-weight:700;font-display:swap}
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-ExtraBold.woff2')format('woff2');font-weight:800;font-display:swap}
@font-face{font-family:'Suit';src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT-Heavy.woff2')format('woff2');font-weight:900;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff0f8;--bg2:#f5e8ff;--surface:#fff;
  --border:rgba(0,0,0,.10);--shadow:rgba(0,0,0,.08);
  --txt:#111827;--txt2:#6b7280;--txt3:#9ca3af;
  --red:#d63031;--red-l:#ffe0e0;--blue:#0984e3;--blue-l:#e0f0ff;
  --pk:#e91e8c;
  --ca:#34a853;--ca-l:#e6f4ea;--ca-d:#1b7a3a;
  --cb:#4285f4;--cb-l:#e8f0fe;--cb-d:#1a56c4;
  --cc:#9b59b6;--cc-l:#f3e8fd;--cc-d:#6c3483;
  --cd:#e74c3c;--cd-l:#fde8e8;--cd-d:#922b21;
}
body{background:linear-gradient(150deg,var(--bg) 0%,var(--bg2) 100%);
  color:var(--txt);font-family:'Suit',sans-serif;min-height:100vh;overflow:hidden}
.screen{display:none;height:100vh;width:100vw;position:absolute;top:0;left:0}
.screen.active{display:flex}
button{cursor:pointer;font-family:inherit;transition:all .18s;border:none}
button:active{transform:scale(.95)}
input{font-family:inherit}

/* HOME */
#s-home{flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
.home-icon{width:90px;height:90px;border-radius:50%;object-fit:cover;
  box-shadow:0 6px 24px rgba(0,0,0,.15);border:3px solid rgba(0,0,0,.08);
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.home-title{font-size:52px;font-weight:900;letter-spacing:-2px;color:#1f2937}
.home-name-input{width:320px;padding:12px 16px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--surface);
  font-size:16px;color:var(--txt);outline:none;text-align:center}
.home-name-input:focus{border-color:#1f2937}
.home-name-input::placeholder{color:var(--txt3)}
.home-recent{background:var(--surface);border-radius:18px;padding:16px 20px;width:320px;
  box-shadow:0 4px 20px var(--shadow);border:1px solid var(--border)}
.home-recent-title{font-size:12px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.home-rec-empty{font-size:13px;color:var(--txt3);text-align:center;padding:8px 0}
.home-rec-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.home-rec-item:last-child{border-bottom:none}
.home-rec-medal{font-size:20px;flex-shrink:0;width:24px;text-align:center}
.home-rec-info{flex:1;min-width:0}
.home-rec-winner{font-size:13px;font-weight:700;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.home-rec-winner.win{color:var(--pk)}
.home-rec-meta{font-size:11px;color:var(--txt3);margin-top:1px}
.home-rec-time{font-size:12px;font-weight:600;color:var(--txt2);flex-shrink:0}
.home-btns{display:flex;gap:8px;width:320px}
.version-badge{position:absolute;top:12px;right:16px;font-size:11px;font-weight:700;
  color:var(--txt3);background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:3px 10px;letter-spacing:.04em}
.btn-primary{flex:1;padding:14px;border-radius:12px;font-size:16px;font-weight:700;
  color:#fff;background:#1f2937;box-shadow:0 4px 14px rgba(31,41,55,.3)}
.btn-primary:hover{background:#111827;box-shadow:0 6px 20px rgba(31,41,55,.4)}
.btn-secondary{flex:1;padding:14px;border-radius:12px;font-size:16px;font-weight:700;
  color:#1f2937;background:var(--surface);border:1.5px solid #1f2937}
.btn-secondary:hover{background:#f9fafb}


/* SETUP (AI mode) */
#s-setup{flex-direction:column;align-items:center;justify-content:center;gap:16px}
.setup-box{background:var(--surface);border-radius:22px;padding:28px;width:360px;
  box-shadow:0 8px 32px var(--shadow);border:1px solid var(--border);
  display:flex;flex-direction:column;gap:16px}
.setup-box h2{font-size:20px;font-weight:800;text-align:center;color:var(--txt)}
.field label{display:block;font-size:11px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.field input{width:100%;padding:11px 13px;background:#f9fafb;border:1.5px solid var(--border);
  border-radius:10px;color:var(--txt);font-size:15px;outline:none}
.field input:focus{border-color:#1f2937;background:#fff}
.field input::placeholder{color:var(--txt3)}
.num-btns{display:flex;gap:5px}
.num-btns button{flex:1;padding:10px 0;background:#f9fafb;border:1.5px solid var(--border);
  border-radius:8px;color:var(--txt2);font-size:13px;font-weight:700}
.num-btns button.sel{background:#1f2937;border-color:transparent;color:#fff}
.num-btns button:hover:not(.sel){border-color:#1f2937;color:var(--txt)}
.setup-hint{font-size:12px;color:var(--txt3);line-height:1.8;text-align:center}
.btn-start{padding:13px;border-radius:11px;font-size:17px;font-weight:700;
  color:#fff;background:#1f2937;box-shadow:0 4px 14px rgba(31,41,55,.25)}
.btn-start:hover{background:#111827}
.btn-back{padding:9px;border-radius:9px;font-size:13px;color:var(--txt2);
  background:#f9fafb;border:1px solid var(--border)}
.btn-back:hover{color:var(--txt)}

/* JOIN */
#s-join{flex-direction:column;align-items:center;justify-content:center;gap:16px}
.code-input{width:200px;padding:16px;border-radius:14px;border:2px solid #1f2937;
  background:var(--surface);font-size:28px;font-weight:800;color:#1f2937;
  outline:none;text-align:center;letter-spacing:6px;text-transform:uppercase}
.code-input::placeholder{color:var(--txt3);letter-spacing:2px;font-size:18px;font-weight:400}

/* LOBBY */
#s-lobby{flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px}
.lobby-box{background:var(--surface);border-radius:22px;padding:30px;width:380px;
  box-shadow:0 8px 32px var(--shadow);border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:16px}
.lobby-title{font-size:18px;font-weight:800;color:var(--txt)}
.lobby-code-wrap{text-align:center}
.lobby-code-label{font-size:11px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.lobby-code{font-size:40px;font-weight:900;letter-spacing:8px;color:#1f2937;
  cursor:pointer;padding:12px 24px;border-radius:14px;background:#f9fafb;
  border:2px dashed var(--border);transition:background .15s}
.lobby-code:hover{background:#f3f4f6}
.lobby-code-hint{font-size:12px;color:var(--txt3);margin-top:6px}
.lobby-players{width:100%;display:flex;flex-direction:column;gap:6px}
.lobby-player{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:#f9fafb;border-radius:10px;border:1px solid var(--border)}
.lobby-player-crown{font-size:16px}
.lobby-player-name{flex:1;font-size:15px;font-weight:600;color:var(--txt)}
.lobby-player-you{font-size:11px;color:var(--txt3);background:#e5e7eb;
  padding:2px 7px;border-radius:20px}
.lobby-status{font-size:13px;color:var(--txt3);text-align:center}

/* RECORDS */
#s-records{flex-direction:column;align-items:center;
  background:linear-gradient(150deg,var(--bg),var(--bg2));
  padding:24px;gap:14px;overflow-y:auto}
#s-records h2{font-size:22px;font-weight:800;color:var(--txt)}
.rec-box{background:var(--surface);border-radius:18px;width:100%;max-width:500px;
  max-height:calc(100vh-140px);overflow-y:auto;
  box-shadow:0 4px 18px var(--shadow);border:1px solid var(--border)}
.rec-empty{padding:36px;text-align:center;color:var(--txt3);font-size:14px}
.rec-item{padding:13px 17px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px}
.rec-item:last-child{border-bottom:none}
.rec-medal{font-size:20px;flex-shrink:0}
.rec-info{flex:1;min-width:0}
.rec-winner{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-winner.win{color:var(--pk)}
.rec-winner.loss{color:var(--txt2)}
.rec-meta{font-size:12px;color:var(--txt3);margin-top:2px}
.rec-time{font-size:12px;font-weight:600;color:var(--txt2);flex-shrink:0}
.rec-top{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:500px}
.btn-ghost{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;
  color:var(--txt2);background:var(--surface);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--txt);border-color:#1f2937}

/* GAME */
#s-game{flex-direction:column;padding:8px 8px 6px;gap:5px;overflow:hidden;
  background:linear-gradient(150deg,var(--bg) 0%,var(--bg2) 100%)}

#g-top{display:flex;gap:8px;flex-shrink:0;justify-content:center;flex-wrap:wrap}

#g-mid{display:flex;gap:8px;justify-content:center;align-items:stretch;
  flex-shrink:0;height:150px}

#g-bot{background:rgba(255,255,255,0.93);
  border:2px solid rgba(0,0,0,0.08);border-radius:18px;
  padding:8px 10px 6px;flex:1;min-height:0;display:flex;flex-direction:column;
  align-items:center;gap:6px;width:100%;box-sizing:border-box;
  box-shadow:0 2px 12px rgba(0,0,0,.07);transition:border-color .25s,box-shadow .25s}
#g-bot.myturn{border-color:#1f2937;background:#fff;
  box-shadow:0 0 0 3px rgba(31,41,55,.22),0 4px 24px rgba(0,0,0,.1);
  animation:myTurnPulse 1.4s ease-in-out infinite}
#g-bot.mywon{border-color:#d97706;
  background:#fffbeb;box-shadow:0 0 0 3px rgba(217,119,6,.3)}
@keyframes myTurnPulse{0%,100%{box-shadow:0 0 0 3px rgba(31,41,55,.22),0 4px 24px rgba(0,0,0,.08)}50%{box-shadow:0 0 0 6px rgba(31,41,55,.1),0 4px 32px rgba(0,0,0,.1)}}
#my-turn-banner{display:none;align-items:center;justify-content:center;gap:6px;
  background:#1f2937;color:#fff;font-size:13px;font-weight:800;letter-spacing:.05em;
  border-radius:20px;padding:5px 16px;animation:bannerPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes bannerPop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
#my-turn-banner.show{display:flex}

.pslot{background:rgba(255,255,255,0.90);
  border:1.5px solid rgba(0,0,0,0.09);border-radius:12px;
  padding:6px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;
  width:110px;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.06);
  transition:border-color .25s,box-shadow .25s,background .25s}
.pslot.turn{border-color:#1f2937;background:#e0f2fe;
  box-shadow:0 0 0 3px rgba(31,41,55,.4),0 4px 16px rgba(0,0,0,.12);
  animation:slotTurnPulse 1.4s ease-in-out infinite}
@keyframes slotTurnPulse{
  0%,100%{box-shadow:0 0 0 2px rgba(31,41,55,.4),0 2px 10px rgba(0,0,0,.08)}
  50%{box-shadow:0 0 0 5px rgba(31,41,55,.15),0 6px 22px rgba(0,0,0,.1)}
}
.pslot.winner{border-color:#d97706;background:#fffbeb}
.pslot.loser{border-color:#dc2626;background:#fff1f2}
.pname{font-size:13px;font-weight:700;color:#111827;text-align:center;
  max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcount{font-size:12px;color:#6b7280;font-weight:600}
.phand{display:flex;gap:1px;flex-wrap:wrap;justify-content:center;max-width:90px}
.mini-card{width:14px;height:20px;border-radius:3px;border:1.5px solid #c8d0dc;background:#eef2f7}
.played-zone{width:60px;height:86px;border:1.5px dashed rgba(0,0,0,.22);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#9ca3af;
  background:#f9fafb}

/* CARD */
.card{border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;user-select:none;transition:transform .18s,box-shadow .18s;flex-shrink:0;
  background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.14);overflow:hidden;
  width:60px;height:86px}
.c-tl,.c-br{position:absolute;font-size:11px;font-weight:900;line-height:1;text-align:center}
.c-tl{top:4px;left:5px}.c-br{bottom:4px;right:5px;transform:rotate(180deg)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:12px 12px 0 0}
.c-emoji{font-size:22px;line-height:1;margin-bottom:1px}
.c-num{font-size:22px;font-weight:900;line-height:1}
.card.ca::before{background:var(--ca)}.card.ca .c-tl,.card.ca .c-br,.card.ca .c-num{color:var(--ca-d)}
.card.cb::before{background:var(--cb)}.card.cb .c-tl,.card.cb .c-br,.card.cb .c-num{color:var(--cb-d)}
.card.cc::before{background:var(--cc)}.card.cc .c-tl,.card.cc .c-br,.card.cc .c-num{color:var(--cc-d)}
.card.cd::before{background:var(--cd)}.card.cd .c-tl,.card.cd .c-br,.card.cd .c-num{color:var(--cd-d)}
.card.hand-card{flex-shrink:0;width:80px;height:115px;transform-origin:bottom center;
  position:relative;z-index:1;border-radius:13px}
.card.hand-card .c-tl,.card.hand-card .c-br{font-size:clamp(10px,2.5vw,15px)}
.card.hand-card .c-emoji{font-size:clamp(20px,4.5vw,34px)}.card.hand-card .c-num{font-size:clamp(18px,4.5vw,32px)}
.card.hand-card::before{height:8px}
.card.clickable{cursor:pointer}
.card.clickable:hover{transform:translateY(-18px) scale(1.05)!important;
  box-shadow:0 16px 32px rgba(0,0,0,.25);z-index:20!important}

.anim-beat{animation:slotBeat 0.9s ease forwards!important}
@keyframes slotBeat{
  0%{transform:scale(1);box-shadow:0 1px 6px rgba(0,0,0,.06)}
  15%{transform:scale(1.06);background:rgba(220,38,38,0.22);box-shadow:0 0 0 3px rgba(220,38,38,.5),0 4px 18px rgba(220,38,38,.3)}
  30%{transform:translateX(-5px) scale(1.03);background:rgba(220,38,38,0.18)}
  45%{transform:translateX(5px) scale(1.03)}
  60%{transform:translateX(-3px);background:rgba(220,38,38,0.12)}
  75%{transform:translateX(3px)}
  90%{transform:scale(1.01)}
  100%{transform:scale(1);box-shadow:0 1px 6px rgba(0,0,0,.06)}
}
.anim-push{animation:slotPush 0.8s ease forwards!important}
@keyframes slotPush{
  0%{transform:scale(1);box-shadow:0 1px 6px rgba(0,0,0,.06)}
  30%{transform:scale(1.05);background:#eff6ff;box-shadow:0 0 0 3px rgba(59,130,246,.5),0 4px 18px rgba(59,130,246,.25)}
  70%{transform:scale(1.02);background:#f0f9ff}
  100%{transform:scale(1);box-shadow:0 1px 6px rgba(0,0,0,.06)}
}
.card.anim-beat-card{animation:cardBeat 0.9s ease forwards!important}
@keyframes cardBeat{
  0%{transform:scale(1)}
  20%{transform:scale(1.15) rotate(-3deg);filter:brightness(0.8) saturate(2)}
  50%{transform:scale(0.9) rotate(2deg);filter:brightness(0.7)}
  80%{transform:scale(1.05) rotate(-1deg)}
  100%{transform:scale(1);filter:none}
}

#g-deck{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
.deck-pile{width:60px;height:86px;background:#1f2937;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:3px 3px 0 rgba(0,0,0,.12),5px 5px 0 rgba(0,0,0,.07);
  border:2px solid rgba(255,255,255,.2)}
.deck-count{font-size:11px;color:var(--txt2);text-align:center;font-weight:500}
#turn-ind{font-size:13px;color:#111827;text-align:center;padding:5px 12px;
  background:rgba(255,255,255,.95);border-radius:20px;border:1px solid rgba(0,0,0,.12);font-weight:700;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.08)}
#game-timer{font-size:13px;color:#374151;font-variant-numeric:tabular-nums;text-align:center;font-weight:600}

#g-log{flex:1;min-width:0;background:rgba(255,255,255,0.92);border-radius:12px;
  padding:7px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;
  border:1px solid rgba(0,0,0,.08);box-shadow:0 1px 6px rgba(0,0,0,.06)}
.log-e{font-size:11px;padding:2px 4px;border-radius:4px;line-height:1.4;word-break:keep-all}
.log-n{color:var(--txt3)}.log-p{color:var(--txt2)}
.log-b{color:var(--red);font-weight:700;background:rgba(220,80,80,.1)}
.log-s{color:#1565c0;font-weight:700;background:rgba(65,130,240,.1)}
.log-w{color:#1f2937;font-weight:800;font-size:12px}
.log-t{color:var(--txt3);font-size:10px;border-top:1px solid rgba(0,0,0,.08);margin-top:2px;padding-top:4px}

.bot-row{display:flex;align-items:center;gap:10px;width:100%}
.bot-name{font-size:16px;font-weight:800;color:#1f2937}
#hint{font-size:14px;color:#1f2937;font-weight:700;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.bot-played{display:flex;align-items:center;gap:10px}
.bot-played-label{font-size:12px;color:var(--txt3)}
#human-hand{display:flex;justify-content:center;align-items:flex-end;
  padding:4px 20px 2px;min-height:110px;width:100%;position:relative;overflow:visible}
#hcard-cnt{font-size:12px;color:var(--txt3)}
.won-banner{background:linear-gradient(135deg,#f6d365,#fda085);
  color:#7c4f00;font-size:13px;font-weight:800;padding:5px 16px;
  border-radius:20px;letter-spacing:.03em;box-shadow:0 2px 8px rgba(253,160,133,.4)}

/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(248,250,252,.75);display:none;
  align-items:center;justify-content:center;z-index:99;backdrop-filter:blur(6px)}
#overlay.show{display:flex}
.ovl-box{background:var(--surface);border:1.5px solid var(--border);
  border-radius:24px;padding:36px 32px;text-align:center;max-width:360px;
  box-shadow:0 16px 48px var(--shadow);animation:popIn .3s ease}
.ovl-box.ovl-loss{background:linear-gradient(160deg,#1f2937,#374151);
  border-color:#4b5563;color:#f9fafb}
.ovl-box.ovl-win{background:linear-gradient(160deg,#fefce8,#fff7ed);
  border-color:rgba(255,190,0,.5)}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.ovl-icon{font-size:56px;line-height:1;margin-bottom:8px}
.ovl-title{font-size:30px;font-weight:900;margin-bottom:6px}
.ovl-box.ovl-loss .ovl-title{color:#f9fafb}
.ovl-box.ovl-win .ovl-title{color:#92400e}
.ovl-sub{font-size:14px;margin-bottom:20px;line-height:1.7;white-space:pre-line}
.ovl-box.ovl-loss .ovl-sub{color:#9ca3af}

.ovl-btns{display:flex;gap:10px;justify-content:center}

</style>
</head>
<body>

<!-- HOME -->
<div id="s-home" class="screen active">
  <div class="version-badge">v0.7</div>
  <img src="icon.webp" class="home-icon" alt="후지플러쉬">
  <div class="home-title">후지 플러쉬</div>
  <div class="home-recent">
    <div class="home-recent-title">🕐 최근 게임</div>
    <div id="home-recent-list"></div>
  </div>
  <div class="home-btns">
    <button class="btn-primary" onclick="goCreate()">🏠 방 만들기</button>
    <button class="btn-secondary" onclick="goJoin()">🚪 방 참가</button>
  </div>
</div>

<!-- CREATE ROOM SETUP -->
<div id="s-create" class="screen" style="flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div class="setup-box">
    <h2>🏠 방 만들기</h2>
    <div class="field">
      <label>내 이름</label>
      <input id="inp-create-name" class="field input" type="text" placeholder="이름 입력" maxlength="12" autocomplete="off" style="width:100%;padding:11px 13px;background:#f9fafb;border:1.5px solid var(--border);border-radius:10px;color:var(--txt);font-size:15px;outline:none;font-family:'Suit',sans-serif">
    </div>
    <div class="field">
      <label>총 플레이어 수</label>
      <div class="num-btns" id="create-num-btns">
        <button onclick="setCreateN(3)">3명</button>
        <button onclick="setCreateN(4)" class="sel">4명</button>
        <button onclick="setCreateN(5)">5명</button>
        <button onclick="setCreateN(6)">6명</button>
        <button onclick="setCreateN(7)">7명</button>
        <button onclick="setCreateN(8)">8명</button>
      </div>
    </div>
    <div class="setup-hint">설정한 인원이 모두 들어오면<br>방장이 게임을 시작할 수 있어요</div>
    <button class="btn-start" onclick="doCreate()">방 만들기</button>
    <button class="btn-back" onclick="show('s-home')">← 뒤로</button>
  </div>
</div>

<!-- JOIN -->
<div id="s-join" class="screen" style="flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div class="setup-box" style="width:320px;align-items:center">
    <h2>🚪 방 참가</h2>
    <div class="field" style="width:100%">
      <label>내 이름</label>
      <input id="inp-join-name" type="text" placeholder="이름 입력" maxlength="12" autocomplete="off" style="width:100%;padding:11px 13px;background:#f9fafb;border:1.5px solid var(--border);border-radius:10px;color:var(--txt);font-size:15px;outline:none;font-family:'Suit',sans-serif">
    </div>
    <input id="inp-code" class="code-input" type="text" placeholder="ABC123" maxlength="6" autocomplete="off">
    <button class="btn-start" style="width:100%" onclick="joinRoom()">참가하기</button>
    <button class="btn-back" style="width:100%" onclick="show('s-home')">← 뒤로</button>
  </div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen" style="flex-direction:column;align-items:center;justify-content:center">
  <div class="lobby-box">
    <div class="lobby-title">🎮 게임 대기실</div>
    <div class="lobby-code-wrap">
      <div class="lobby-code-label">방 코드</div>
      <div class="lobby-code" id="lobby-code" onclick="copyCode()" title="클릭해서 복사">??????</div>
      <div class="lobby-code-hint">클릭하면 복사돼요 👆</div>
    </div>
    <div class="lobby-players" id="lobby-players"></div>
    <div class="lobby-status" id="lobby-status">플레이어를 기다리는 중...</div>
    <button class="btn-start" id="btn-lobby-start" style="display:none;width:100%" onclick="startMultiGame()">게임 시작!</button>
    <button class="btn-back" style="width:100%" onclick="leaveRoom()">← 나가기</button>
  </div>
</div>

<!-- RECORDS -->
<div id="s-records" class="screen">
  <div class="rec-top">
    <h2>🏆 게임 기록</h2>
    <button class="btn-ghost" onclick="show('s-home');refreshHomeRecords()">← 홈</button>
  </div>
  <div class="rec-box" id="rec-list"></div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div id="g-top"></div>
  <div id="g-mid">
    <div id="g-deck">
      <div class="deck-pile" id="deck-pile">🂠</div>
      <div class="deck-count" id="deck-cnt">남은 카드: 0장</div>
      <div id="turn-ind">-</div>
      <div id="game-timer">0:00</div>
    </div>
    <div id="g-log"></div>
  </div>
  <div id="g-bot">
    <div class="bot-row">
      <span class="bot-name" id="bot-name">나</span>
      <div id="my-turn-banner">✏️ 내 차례</div>
      <span id="hcard-cnt" style="margin-left:auto"></span>
    </div>
    <div class="bot-played">
      <span class="bot-played-label">낸 카드:</span>
      <div id="h-played" class="played-zone">없음</div>
    </div>
    <div id="human-hand"></div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="ovl-box">
    <div class="ovl-icon" id="ovl-icon">🎉</div>
    <div class="ovl-title" id="ovl-title">승리!</div>
    <div class="ovl-sub" id="ovl-sub"></div>
    <div class="ovl-btns">
      <button class="btn-again" id="ovl-again">다시 하기</button>
      <button class="btn-watch" id="ovl-watch" onclick="overlayWatch()">관전하기</button>
      <button class="btn-home2" onclick="overlayHome()">홈으로</button>
    </div>
    <div class="ovl-stats" id="ovl-stats"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, off, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

// ── FIREBASE ──
const firebaseConfig = {
  apiKey: "AIzaSyBGNTx9Qm_4RJepW0OEZ4te3ln5QLg6_nc",
  authDomain: "fuji-flush-6a751.firebaseapp.com",
  databaseURL: "https://fuji-flush-6a751-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fuji-flush-6a751",
  storageBucket: "fuji-flush-6a751.firebasestorage.app",
  messagingSenderId: "867218453097",
  appId: "1:867218453097:web:1f8dafc49980bef1b2e8f8"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ── IDENTITY ──
let myUid = localStorage.getItem('fuji-uid');
if (!myUid) { myUid = Math.random().toString(36).slice(2, 10); localStorage.setItem('fuji-uid', myUid); }

// ── STATE ──
const BASE_DECK = [
  ...Array(16).fill(2),...Array(12).fill(3),...Array(9).fill(4),
  ...Array(8).fill(5),...Array(6).fill(6),...Array(6).fill(7),
  ...Array(5).fill(8),...Array(4).fill(9),...Array(4).fill(10),
  ...Array(4).fill(11),...Array(3).fill(12),...Array(3).fill(13),
  ...Array(3).fill(14),...Array(2).fill(15),16,17,18,19,20
];

let G = null;          // current game state
let roomCode = null;
let roomUnsub = null;
let myTurnBusy = false;
let aiProcessing = false;
let timerIv = null;
let amHost = false;

// ── UTILS ──
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]} return b; }
function dc(o) { return JSON.parse(JSON.stringify(o)); }
function cardClass(n) { return n<=5?'ca':n<=10?'cb':n<=15?'cc':'cd'; }
function cardEmoji(n) { return n<=5?'💧':n<=10?'🌊':n<=15?'⛰️':'🌋'; }
function mkCard(n, extra='') {
  const d = document.createElement('div');
  d.className = `card ${cardClass(n)} ${extra}`.trim();
  d.innerHTML = `<div class="c-tl">${n}</div><div class="c-emoji">${cardEmoji(n)}</div><div class="c-num">${n}</div><div class="c-br">${n}</div>`;
  return d;
}
function fmtDur(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function fmtDate(iso) { const d=new Date(iso); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function getSavedName() { return localStorage.getItem('fuji-name')||''; }
function saveName(n) { if(n) localStorage.setItem('fuji-name', n); }
function myName(inputId) {
  const el = document.getElementById(inputId);
  const n = (el?.value||'').trim();
  saveName(n);
  return n || getSavedName() || '플레이어';
}

// ── SCREENS ──
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
window.show = show;
function overlayOn(on) { document.getElementById('overlay').classList.toggle('show', on); }
window.overlayHome = () => { leaveRoom(); };
window.overlayWatch = () => { overlayOn(false); renderAll(); };

// ── LOCAL STORAGE (records) ──
const LS = 'fujiflush_v1';
function getRecords() { try { return JSON.parse(localStorage.getItem(LS)||'[]'); } catch { return []; } }
function saveRecord(r) { const rs=getRecords(); rs.unshift(r); if(rs.length>100)rs.splice(100); localStorage.setItem(LS,JSON.stringify(rs)); }

function refreshHomeRecords() {
  const rs = getRecords().slice(0, 3);
  const el = document.getElementById('home-recent-list');
  if (!rs.length) { el.innerHTML = '<div class="home-rec-empty">아직 기록이 없습니다 🎮</div>'; return; }
  el.innerHTML = '';
  rs.forEach((r, i) => {
    const medal = i===0?'🥇':i===1?'🥈':'🥉';
    const div = document.createElement('div'); div.className = 'home-rec-item';
    div.innerHTML = `<div class="home-rec-medal">${medal}</div>
      <div class="home-rec-info">
        <div class="home-rec-winner ${r.humanWon?'win':''}">${r.humanWon?'🏆 ':''}${r.winner} 승리</div>
        <div class="home-rec-meta">${r.numPlayers}명 · ${r.playerName} 참가 · ${fmtDate(r.date)}</div>
      </div>
      <div class="home-rec-time">${fmtDur(r.duration)}</div>`;
    el.appendChild(div);
  });
}

// ── ROOM MANAGEMENT ──
let createN = 4;
window.setCreateN = (n) => {
  createN = n;
  document.querySelectorAll('#create-num-btns button').forEach((b,i) => b.classList.toggle('sel', i+3===n));
};
window.goCreate = () => { show('s-create'); const s=getSavedName(); if(s)document.getElementById('inp-create-name').value=s; document.getElementById('inp-create-name').focus(); };
window.doCreate = async () => {
  const name = myName('inp-create-name');
  const code = Math.random().toString(36).slice(2, 8).toUpperCase();
  roomCode = code; amHost = true;
  await set(ref(db, `rooms/${code}`), {
    hostId: myUid,
    maxPlayers: createN,
    status: 'waiting',
    players: { [myUid]: { name, joinedAt: Date.now() } }
  });
  document.getElementById('lobby-code').textContent = code;
  show('s-lobby');
  listenRoom(code);
};

window.goJoin = () => {
  document.getElementById('inp-code').value = '';
  const s=getSavedName(); if(s)document.getElementById('inp-join-name').value=s;
  show('s-join');
  setTimeout(() => document.getElementById('inp-join-name').focus(), 120);
};

window.joinRoom = async () => {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (code.length < 4) { alert('방 코드를 입력해주세요'); return; }
  const snap = await get(ref(db, `rooms/${code}`));
  if (!snap.exists()) { alert('방이 없습니다. 코드를 확인해주세요.'); return; }
  const room = snap.val();
  if (room.status !== 'waiting') { alert('이미 시작된 방입니다.'); return; }
  const name = myName('inp-join-name');
  await update(ref(db, `rooms/${code}/players`), { [myUid]: { name, joinedAt: Date.now() } });
  roomCode = code;
  document.getElementById('lobby-code').textContent = code;
  show('s-lobby');
  listenRoom(code);
};

window.leaveRoom = () => {
  if (roomUnsub) { roomUnsub(); roomUnsub = null; }
  if (roomCode) { update(ref(db, `rooms/${roomCode}/players/${myUid}`), { left: true }).catch(()=>{}); }
  roomCode = null; G = null; myTurnBusy = false; aiProcessing = false; amHost = false;
  clearInterval(timerIv);
  overlayOn(false);
  refreshHomeRecords(); show('s-home');
};

window.copyCode = () => {
  navigator.clipboard.writeText(roomCode||'').then(() => {
    const el = document.getElementById('lobby-code');
    const orig = el.textContent;
    el.textContent = '복사됨! ✓';
    setTimeout(() => { el.textContent = orig; }, 1200);
  });
};

function listenRoom(code) {
  if (roomUnsub) { roomUnsub(); roomUnsub = null; }
  const r = ref(db, `rooms/${code}`);
  roomUnsub = onValue(r, snap => {
    if (!snap.exists()) return;
    const room = snap.val();
    const currentScreen = document.querySelector('.screen.active')?.id;

    if (room.status === 'waiting') {
      renderLobby(room, code);
    } else if (room.status === 'playing') {
      if (currentScreen !== 's-game') { show('s-game'); timerStart(); }
      const prevEvent = G?.lastEvent;
      G = normalizeGame(room.game);
      renderAll();
      // 이벤트가 새로 왔으면 애니메이션 트리거
      if (G.lastEvent && G.lastEvent.ts !== prevEvent?.ts) {
        const ev = G.lastEvent;
        if (ev.type === 'beat') triggerAnimation(ev.ids, 'anim-beat');
        if (ev.type === 'push') triggerAnimation(ev.ids, 'anim-push');
      }
      if (G.phase === 'playing' && isMyTurn()) handleMyTurnStart();
      if (G.phase === 'playing' && amHost && isCurrentPlayerAI()) { aiProcessing = false; setTimeout(doAiTurn, 900); }
      rescheduleWatchdog();
    } else if (room.status === 'ended') {
      G = normalizeGame(room.game);
      renderAll();
      showEndOverlay();
    }
  });
}

function renderLobby(room, code) {
  const players = room.players || {};
  const el = document.getElementById('lobby-players');
  el.innerHTML = '';
  const ordered = Object.entries(players)
    .filter(([,p]) => !p.left)
    .sort(([,a],[,b]) => a.joinedAt - b.joinedAt);

  ordered.forEach(([uid, p]) => {
    const div = document.createElement('div'); div.className = 'lobby-player';
    const isHost = uid === room.hostId;
    const isMe = uid === myUid;
    div.innerHTML = `<span class="lobby-player-crown">${isHost?'👑':'👤'}</span>
      <span class="lobby-player-name">${p.name}</span>
      ${isMe?'<span class="lobby-player-you">나</span>':''}`;
    el.appendChild(div);
  });

  const count = ordered.length;
  const max = room.maxPlayers || 8;
  const isHost = room.hostId === myUid;
  const statusEl = document.getElementById('lobby-status');
  const startBtn = document.getElementById('btn-lobby-start');

  statusEl.textContent = `${count} / ${max}명 참가 중`;
  startBtn.style.display = isHost ? '' : 'none';
  if (isHost) startBtn.disabled = false;
}

window.startMultiGame = async () => {
  const snap = await get(ref(db, `rooms/${roomCode}/players`));
  const players = snap.val() || {};
  const hostSnap = await get(ref(db, `rooms/${roomCode}/hostId`));
  if (hostSnap.val() !== myUid) return;
  const maxSnap = await get(ref(db, `rooms/${roomCode}/maxPlayers`));
  const maxPlayers = maxSnap.val() || 4;

  const humanOrder = Object.entries(players)
    .filter(([,p]) => !p.left)
    .sort(([,a],[,b]) => a.joinedAt - b.joinedAt)
    .map(([uid]) => uid);

  const aiNames = ['AI1','AI2','AI3','AI4','AI5','AI6','AI7'];
  const aiOrder = [];
  for (let i = 0; humanOrder.length + aiOrder.length < maxPlayers; i++) {
    const aid = `ai${i+1}`;
    players[aid] = { name: aiNames[i], isAI: true };
    aiOrder.push(aid);
  }

  const playerOrder = shuffle([...humanOrder, ...aiOrder]);
  const n = playerOrder.length;
  const hs = n >= 7 ? 5 : 6;
  const deck = shuffle([...BASE_DECK]);
  const ps = {};
  playerOrder.forEach(uid => {
    ps[uid] = { name: players[uid].name, hand: deck.splice(0, hs), played: null, isWinner: false, isAI: !!players[uid].isAI };
  });

  const game = {
    playerOrder, players: ps, deck, discard: [], hostId: myUid,
    cur: 0, phase: 'playing', winners: [], turnCount: 0,
    startTime: Date.now(), log: [`게임 시작! ${humanOrder.length}명 + AI ${aiOrder.length}명`]
  };
  await update(ref(db, `rooms/${roomCode}`), { status: 'playing', game });
};

// ── GAME LOGIC ──
function isMyTurn() {
  if (!G || !G.playerOrder) return false;
  return G.playerOrder[G.cur] === myUid;
}

let watchdogTimer = null;
function rescheduleWatchdog() {
  if (!amHost) return;
  clearTimeout(watchdogTimer);
  watchdogTimer = setTimeout(() => {
    if (G && G.phase === 'playing' && amHost && isCurrentPlayerAI()) {
      console.warn('[watchdog] AI turn stuck, retrying');
      aiProcessing = false;
      doAiTurn();
    }
  }, 3000);
}

function isCurrentPlayerAI() {
  if (!G || !G.playerOrder) return false;
  const cur = G.players[G.playerOrder[G.cur]];
  return cur && cur.isAI;
}

async function doAiTurn() {
  if (!G || G.phase !== 'playing' || aiProcessing) return;
  const curId = G.playerOrder[G.cur];
  const p = G.players[curId];
  if (!p || !p.isAI) return;
  if (p.isWinner) {
    const g = dc(G); g.phase = 'gameover'; await writeGame(g); return;
  }
  aiProcessing = true;
  try {
    const g = dc(G);
    const ap = g.players[curId];
    g.turnCount++;
    addLog(g, `▸ ${ap.name}의 차례`, 't');

    // ── Phase 1: push-through ──
    if (ap.played !== null) {
      // Show push animation then resolve
      const pushGroup = g.playerOrder.filter(i => !g.players[i].isWinner && g.players[i].played === ap.played);
      g.lastEvent = { type: 'push', ids: pushGroup, ts: Date.now() };
      await writeGame(g);          // 모든 클라이언트 push 애니메이션 표시
      await sleep(900);
      const newW = runPush(g, curId);
      if (newW.length) { g.phase = 'gameover'; await writeGame(g); return; }
    }

    // ── Phase 2: 새 카드 내기 ──
    if (!ap.isWinner && ap.hand && ap.hand.length > 0) {
      const val = ap.hand[Math.floor(Math.random() * ap.hand.length)];
      ap.hand.splice(ap.hand.indexOf(val), 1);
      ap.played = val;
      addLog(g, `${ap.name}가 ${val} 냄`, 'p');
      // 카드 공개 — beat 전에 먼저 표시
      g.lastEvent = { type: 'play', ids: [curId], ts: Date.now() };
      await writeGame(g);
      await sleep(700);            // 잠시 카드 노출 후 격파 계산
      const beatenIds = runBeatCheck(g, curId);
      if (beatenIds.length) {
        g.lastEvent = { type: 'beat', ids: beatenIds, ts: Date.now() };
        await writeGame(g);        // 격파 애니메이션
        await sleep(1000);
      }
    } else if (!ap.isWinner) {
      ap.isWinner = true;
      if (!g.winners.includes(curId)) { g.winners.push(curId); addLog(g, `🏆 ${ap.name} 승리!!`, 'w'); }
      g.phase = 'gameover'; await writeGame(g); return;
    }

    g.cur = nextCur(g);
    g.lastEvent = null;
    await writeGame(g);
  } catch(e) {
    console.error('doAiTurn error:', e);
  } finally {
    aiProcessing = false;
  }
}

function normalizeGame(game) {
  if (!game) return game;
  if (game.deck && !Array.isArray(game.deck)) game.deck = Object.values(game.deck);
  if (!game.deck) game.deck = [];
  if (game.discard && !Array.isArray(game.discard)) game.discard = Object.values(game.discard);
  if (!game.discard) game.discard = [];
  if (game.playerOrder && !Array.isArray(game.playerOrder)) game.playerOrder = Object.values(game.playerOrder);
  if (game.winners && !Array.isArray(game.winners)) game.winners = Object.values(game.winners);
  if (!game.winners) game.winners = [];
  if (game.log && !Array.isArray(game.log)) game.log = Object.values(game.log);
  if (!game.log) game.log = [];
  if (game.players) {
    Object.keys(game.players).forEach(id => {
      const p = game.players[id];
      if (p.hand && !Array.isArray(p.hand)) p.hand = Object.values(p.hand);
      if (!p.hand) p.hand = [];  // Firebase strips empty arrays
      if (!('played' in p) || p.played === undefined) p.played = null;
    });
  }
  if (game.lastEvent && game.lastEvent.ids && !Array.isArray(game.lastEvent.ids))
    game.lastEvent.ids = Object.values(game.lastEvent.ids);
  return game;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function addLog(g, msg, type='n') {
  if (!g.log) g.log = [];
  g.log.unshift({msg,type});
  if (g.log.length > 30) g.log.pop();
}

// returns array of beaten player IDs
function runBeatCheck(g, actorId) {
  const X = g.players[actorId].played; if (X===null) return [];
  const myGroup = g.playerOrder.filter(id => !g.players[id].isWinner && g.players[id].played===X);
  const myVal = myGroup.length * X, isJoin = myGroup.length > 1;
  const otherVals = [...new Set(g.playerOrder.filter(id => !g.players[id].isWinner && g.players[id].played!==null && g.players[id].played!==X).map(id=>g.players[id].played))];
  const beaten = new Set(), beatUs = [];
  for (const Y of otherVals) {
    const theirGroup = g.playerOrder.filter(id => !g.players[id].isWinner && g.players[id].played===Y);
    const theirVal = theirGroup.length * Y;
    if (myVal > theirVal) theirGroup.forEach(id => beaten.add(id));
    else if (isJoin && theirVal > myVal) beatUs.push(...theirGroup);
  }
  const allBeaten = [];
  if (beaten.size) {
    const who = myGroup.map(id=>g.players[id].name).join('+');
    addLog(g, `💥 ${who}(합${myVal}) → ${[...beaten].map(id=>g.players[id].name).join(', ')} 격파!`, 'b');
    beaten.forEach(id => { allBeaten.push(id); flushPlayer(g, id, true); });
  }
  // beatUs(합산이 상대보다 낮을 때 불이익) 로직 제거 — 조인은 이점만 주고 페널티 없음
  return allBeaten;
}

function flushPlayer(g, id, draw) {
  const p = g.players[id]; if (p.played===null) return;
  g.discard.push(p.played); p.played = null;
  if (draw && g.deck.length > 0) { p.hand.push(g.deck.pop()); addLog(g, `  ${p.name} 카드 보충`, 'n'); }
}

// returns array of push-winner IDs
function runPush(g, id) {
  const p = g.players[id]; if (!p||p.played===null) return [];
  const X = p.played;
  const group = g.playerOrder.filter(i => !g.players[i].isWinner && g.players[i].played===X);
  addLog(g, `🌊 ${group.map(i=>g.players[i].name).join('+')}의 ${X} 푸시!`, 's');
  group.forEach(i => { g.discard.push(g.players[i].played); g.players[i].played = null; });
  const newW = [];
  group.forEach(i => {
    if (!g.players[i].isWinner && g.players[i].hand.length===0) {
      g.players[i].isWinner = true; g.winners.push(i); newW.push(g.players[i].name);
    }
  });
  if (newW.length) addLog(g, `🏆 ${newW.join(', ')} 승리!!`, 'w');
  return newW; // returns winner names (non-empty = game over)
}

// animate beat/push events for given player IDs
function triggerAnimation(ids, animClass) {
  if (!ids || !ids.length) return;
  ids.forEach(id => {
    const el = id === myUid
      ? document.getElementById('g-bot')
      : document.getElementById(`pslot-${id}`);
    if (!el) return;
    el.classList.remove('anim-beat','anim-push');
    void el.offsetWidth; // force reflow
    el.classList.add(animClass);
    el.addEventListener('animationend', () => el.classList.remove(animClass), {once:true});
    // also animate played card inside the slot
    const card = el.querySelector('.card');
    if (card) {
      card.classList.remove('anim-beat-card');
      void card.offsetWidth;
      card.classList.add('anim-beat-card');
      card.addEventListener('animationend', ()=>card.classList.remove('anim-beat-card'), {once:true});
    }
  });
}

function nextCur(g) {
  const n = g.playerOrder.length; let nxt = (g.cur+1)%n, tries = 0;
  while (g.players[g.playerOrder[nxt]].isWinner && tries<n) { nxt=(nxt+1)%n; tries++; }
  return tries>=n ? g.cur : nxt;
}

// ── ONLINE TURN HANDLING ──
async function handleMyTurnStart() {
  if (myTurnBusy) return;
  myTurnBusy = true;
  try {
    const p = G.players[myUid];
    if (!p || p.isWinner) { myTurnBusy = false; await writeAndAdvance(dc(G)); return; }
    if (p.hand.length===0 && p.played===null) {
      const g = dc(G);
      g.players[myUid].isWinner = true;
      if (!g.winners.includes(myUid)) { g.winners.push(myUid); addLog(g, `🏆 ${p.name} 승리!!`, 'w'); }
      g.phase = 'gameover';
      myTurnBusy = false;
      await writeGame(g);
      return;
    }

    if (p.played !== null) {
      const g = dc(G); g.turnCount++;
      addLog(g, `▸ ${p.name}의 차례`, 't');
      const pushGroup = g.playerOrder.filter(i => !g.players[i].isWinner && g.players[i].played === p.played);
      g.lastEvent = { type: 'push', ids: pushGroup, ts: Date.now() };
      await writeGame(g);           // 푸시 애니메이션 표시
      await sleep(900);
      const newW = runPush(g, myUid);
      if (newW.length) { g.phase='gameover'; myTurnBusy=false; await writeGame(g); return; }
      myTurnBusy = false;
      g.lastEvent = null;
      await writeGame(g);
      if (G && G.phase==='playing' && isMyTurn() && G.players[myUid]?.played===null) renderAll();
      return;
    }

    myTurnBusy = false;
    renderAll();
  } catch(e) {
    console.error('handleMyTurnStart error:', e);
    myTurnBusy = false;
  }
}

window.onlinePlay = async (val) => {
  if (myTurnBusy || !isMyTurn() || G.phase!=='playing') return;
  const p = G.players[myUid];
  if (!p || p.hand.indexOf(val)===-1) return;
  myTurnBusy = true;
  try {
    const g = dc(G);
    const idx = g.players[myUid].hand.indexOf(val);
    g.players[myUid].hand.splice(idx, 1);
    g.players[myUid].played = val;
    addLog(g, `${p.name}가 ${val} 냄`, 'p');
    // 카드 공개 먼저
    g.lastEvent = { type: 'play', ids: [myUid], ts: Date.now() };
    await writeGame(g);
    await sleep(600);
    const beatenIds = runBeatCheck(g, myUid);
    if (beatenIds.length) {
      g.lastEvent = { type: 'beat', ids: beatenIds, ts: Date.now() };
      await writeGame(g);
      await sleep(1000);
    }
    g.cur = nextCur(g);
    g.lastEvent = null;
    await writeGame(g);
  } catch(e) {
    console.error('onlinePlay error:', e);
  } finally {
    myTurnBusy = false;
  }
};

async function writeAndAdvance(g) {
  addLog(g, `▸ ${g.players[g.playerOrder[g.cur]].name}의 차례`, 't');
  g.cur = nextCur(g);
  await writeGame(g);
}

async function writeGame(g) {
  if (!roomCode) return;
  const status = g.phase==='gameover' ? 'ended' : 'playing';
  await update(ref(db, `rooms/${roomCode}`), { status, game: g });
  // showEndOverlay는 onValue 리스너(listenRoom)에서만 호출 — 여기서 호출 시 중복 기록 저장됨
}

let _lastSavedGame = 0;
function showEndOverlay() {
  if (!G) return;
  const dur = Math.floor((Date.now()-G.startTime)/1000);
  const winnerId = G.winners[0];
  const winnerName = winnerId ? G.players[winnerId]?.name : '?';
  const humanWon = G.winners.includes(myUid);
  const pName = getSavedName() || '플레이어';
  // 같은 게임을 두 번 저장하지 않도록 startTime으로 중복 방지
  if (G.startTime !== _lastSavedGame) {
    _lastSavedGame = G.startTime;
    saveRecord({ date:new Date().toISOString(), duration:dur, playerName:pName,
      numPlayers:G.playerOrder.length, winner:winnerName, humanWon, turns:G.turnCount });
  }
  const box = document.querySelector('.ovl-box');
  if(box){ box.classList.toggle('ovl-win', humanWon); box.classList.toggle('ovl-loss', !humanWon); }
  document.getElementById('ovl-icon').textContent = humanWon ? '🎉' : '😭';
  document.getElementById('ovl-title').textContent = humanWon ? '승리!' : '패배!';
  const meP = G.players[myUid];
  const sub = humanWon
    ? `🎉 축하합니다, ${meP?.name}님!\n가장 먼저 모든 카드를 비웠습니다!`
    : `😭 ${winnerName}님이 먼저 모든 카드를 비웠습니다.\n\n아쉽지만 다음 기회에!`;
  document.getElementById('ovl-sub').textContent = sub;
  document.getElementById('ovl-stats').innerHTML = `⏱ ${fmtDur(dur)} &nbsp;·&nbsp; 🔄 ${G.turnCount}턴`;
  document.getElementById('ovl-again').style.display = 'none';
  document.getElementById('ovl-watch').style.display = humanWon ? 'none' : '';
  overlayOn(true);
}

window.humanPlay = (val) => window.onlinePlay(val);

// ── TIMER ──
function timerStart() {
  clearInterval(timerIv);
  timerIv = setInterval(()=>{
    if(!G||G.phase!=='playing')return;
    const s=Math.floor((Date.now()-G.startTime)/1000);
    const el=document.getElementById('game-timer');
    if(el)el.textContent=fmtDur(s);
  },500);
}

// ── RENDERING ──
function renderAll() { renderTop(); renderBot(); renderDeck(); renderLog(); }

function renderTop() {
  const el = document.getElementById('g-top'); if(!el||!G)return; el.innerHTML='';
  const others = G.playerOrder.filter(id => id !== myUid);
  others.forEach(id => {
    const p = G.players[id]; if(!p)return;
    const isTurn = id === G.playerOrder[G.cur] && !p.isWinner;
    const isLoser = G.phase==='gameover' && !G.winners.includes(id);
    const div = document.createElement('div');
    div.className = `pslot${isTurn?' turn':''}${p.isWinner?' winner':''}${isLoser?' loser':''}`;
    div.id = `pslot-${id}`;

    // 이름
    const nm = document.createElement('div'); nm.className='pname';
    nm.textContent = p.isWinner ? `🏆 ${p.name}` : isLoser ? `💀 ${p.name}` : isTurn ? `▶ ${p.name}` : p.name;

    // 낸 카드 영역
    const zone = document.createElement('div'); zone.className='played-zone';
    if(p.played!==null){zone.style.cssText='border:none;background:transparent;padding:0';zone.appendChild(mkCard(p.played));}
    else { const t=document.createElement('span'); t.style.cssText='font-size:11px;color:#aaa'; t.textContent='없음'; zone.appendChild(t); }

    // 손패 팬 레이아웃
    const fanWrap = document.createElement('div');
    fanWrap.style.cssText='display:flex;align-items:flex-end;justify-content:center;height:28px;position:relative;';
    const n = p.hand.length;
    const maxAngle = Math.min(24, n * 3);
    for (let i = 0; i < n; i++) {
      const mc = document.createElement('div');
      const angle = n > 1 ? (i/(n-1) - 0.5) * maxAngle : 0;
      const lift = n > 1 ? Math.abs(angle) * 0.5 : 0;
      const overlap = n > 1 ? Math.max(-10, -4 * Math.log(n+1)) : 0;
      mc.style.cssText = `width:12px;height:18px;border-radius:3px;border:1.5px solid #c8d0dc;background:#eef2f7;
        flex-shrink:0;transform:rotate(${angle}deg) translateY(${-lift}px);
        margin-left:${i===0?'0':overlap+'px'};z-index:${i+1};position:relative`;
      fanWrap.appendChild(mc);
    }
    if (n === 0 && !p.isWinner) {
      const t = document.createElement('span');
      t.style.cssText='font-size:10px;color:#9ca3af';
      t.textContent='패없음'; fanWrap.appendChild(t);
    }
    const cnt = document.createElement('div'); cnt.className='pcount';
    cnt.textContent = p.isWinner ? '승리!' : `${p.hand.length}장`;
    div.append(nm, zone, fanWrap, cnt); el.appendChild(div);
  });
}

function renderBot() {
  if(!G)return;
  const p = G.players[myUid]; if(!p)return;
  const playPhase = isMyTurn() && !myTurnBusy && p.played===null && G.phase==='playing';
  const iAmLoser = G.phase==='gameover' && !G.winners.includes(myUid);
  const bot = document.getElementById('g-bot');
  bot.classList.toggle('myturn', playPhase);
  bot.classList.toggle('mywon', !!p.isWinner && !iAmLoser);
  document.getElementById('bot-name').textContent = p.isWinner ? `${p.name} 🏆` : iAmLoser ? `${p.name} 💀` : p.name;
  const banner = document.getElementById('my-turn-banner');
  if(banner){
    if(p.isWinner && !iAmLoser) {
      banner.innerHTML='🏆 승리! 대기 중...'; banner.classList.add('show'); banner.style.background='#d97706';
    } else {
      banner.classList.toggle('show', playPhase);
      if(playPhase){ banner.innerHTML='✏️ 내 차례'; banner.style.background=''; }
    }
  }
  document.getElementById('hcard-cnt').textContent = p.isWinner ? '완료' : `패 ${p.hand.length}장`;
  const hz = document.getElementById('h-played');
  hz.innerHTML=''; hz.className='played-zone'; hz.style.cssText='';
  if(p.played!==null){hz.style.cssText='border:none;background:transparent;padding:0';hz.appendChild(mkCard(p.played));}
  else { const t=document.createElement('span'); t.style.cssText='font-size:12px;color:#aaa'; t.textContent='없음'; hz.appendChild(t); }
  const hh = document.getElementById('human-hand'); hh.innerHTML='';
  const sorted = [...p.hand].sort((a,b)=>a-b);
  const n = sorted.length;
  const maxAngle = Math.min(30, n * 4);
  sorted.forEach((v, i) => {
    const c = mkCard(v,'hand-card'+(playPhase?' clickable':''));
    if(playPhase) c.onclick=()=>window.humanPlay(v);
    const angle = n > 1 ? (i/(n-1) - 0.5) * maxAngle : 0;
    const lift = n > 1 ? Math.abs(angle) * 0.7 : 0;
    const overlap = n > 1 ? Math.max(-50, -15 * Math.log(n)) : 0;
    c.style.marginLeft = i===0 ? '0' : `${overlap}px`;
    c.style.transform = `rotate(${angle}deg) translateY(${lift}px)`;
    c.style.zIndex = String(i+1);
    hh.appendChild(c);
  });
}

function renderDeck() {
  if(!G)return;
  const el = document.getElementById('deck-cnt');
  if(el)el.textContent=`남은 카드: ${G.deck?G.deck.length:0}장`;
  const pile = document.getElementById('deck-pile');
  if(pile)pile.textContent=(G.deck&&G.deck.length>0)?'🂠':'📭';
  const ind = document.getElementById('turn-ind');
  if(ind&&G.playerOrder&&G.playerOrder[G.cur]) {
    const c = G.players[G.playerOrder[G.cur]];
    const meId = myUid;
    const isMeTurn = G.playerOrder[G.cur]===myUid;
    ind.textContent = c?.isWinner?'게임 종료':`${c?.name}의 차례${isMeTurn?' ✏️':''}`;
  }
}

function renderLog() {
  const el = document.getElementById('g-log'); if(!el||!G||!G.log)return;
  el.innerHTML='';
  const logs = Array.isArray(G.log) ? G.log : Object.values(G.log);
  logs.slice(0,18).forEach(e=>{
    const d=document.createElement('div');
    d.className=`log-e log-${e.type||'n'}`;
    d.textContent=e.msg||e;
    el.appendChild(d);
  });
}

// ── INIT ──
refreshHomeRecords();

// Enter key in code input
document.getElementById('inp-code').addEventListener('keydown', e=>{ if(e.key==='Enter')window.joinRoom(); });
</script>
